name: Build Refactored EXEs

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install selenium openpyxl pyinstaller

    - name: Build smart_routing_refactor
      run: >
        pyinstaller --onefile --name smart_routing_refactor
        --hidden-import=selenium.webdriver.edge.webdriver
        --hidden-import=selenium.webdriver.edge.service
        --hidden-import=selenium.webdriver.edge.options
        --hidden-import=selenium.webdriver.common.action_chains
        --hidden-import=selenium.webdriver.support.ui
        --hidden-import=selenium.webdriver.support.expected_conditions
        --hidden-import=openpyxl
        smart_routing_refactor.py

    - name: Build auto_create_correspondent_refactor
      run: >
        pyinstaller --onefile --name auto_create_correspondent_refactor
        --hidden-import=selenium.webdriver.edge.webdriver
        --hidden-import=selenium.webdriver.edge.service
        --hidden-import=selenium.webdriver.edge.options
        --hidden-import=selenium.webdriver.common.action_chains
        --hidden-import=selenium.webdriver.support.ui
        --hidden-import=selenium.webdriver.support.expected_conditions
        auto_create_correspondent_refactor.py

    - name: Upload smart_routing_refactor
      uses: actions/upload-artifact@v4
      with:
        name: smart_routing_refactor
        path: dist/smart_routing_refactor.exe

    - name: Upload auto_create_correspondent_refactor
      uses: actions/upload-artifact@v4
      with:
        name: auto_create_correspondent_refactor
        path: dist/auto_create_correspondent_refactor.exe
