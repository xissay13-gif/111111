name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install selenium pyinstaller

    - name: Install UPX
      run: |
        choco install upx -y

    - name: Build EXE
      run: >
        pyinstaller --onefile --name asud_create_doc
        --hidden-import=selenium.webdriver.edge.webdriver
        --hidden-import=selenium.webdriver.edge.service
        --hidden-import=selenium.webdriver.edge.options
        --hidden-import=selenium.webdriver.common.action_chains
        --hidden-import=selenium.webdriver.support.ui
        --hidden-import=selenium.webdriver.support.expected_conditions
        --exclude-module=tkinter
        --exclude-module=unittest
        --exclude-module=email
        --exclude-module=xml
        --exclude-module=pydoc
        --strip
        asud_create_doc.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: asud_create_doc
        path: dist/asud_create_doc.exe
