name: Build Smart Routing EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install selenium openpyxl pyinstaller pyautogui pywinauto

    - name: Build EXE
      run: >
        pyinstaller --onefile --name smart_routing
        --hidden-import=selenium.webdriver.edge.webdriver
        --hidden-import=selenium.webdriver.edge.service
        --hidden-import=selenium.webdriver.edge.options
        --hidden-import=selenium.webdriver.common.action_chains
        --hidden-import=selenium.webdriver.support.ui
        --hidden-import=selenium.webdriver.support.expected_conditions
        --hidden-import=openpyxl
        --hidden-import=pyautogui
        --hidden-import=pywinauto
        smart_routing.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: smart_routing
        path: dist/smart_routing.exe
