name: Build Outlook Export EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install pywin32 openpyxl pyinstaller

    - name: Build EXE
      run: >
        pyinstaller --onefile --name outlook_export
        --hidden-import=win32com.client
        --hidden-import=win32com
        --hidden-import=pywintypes
        --hidden-import=pythoncom
        --hidden-import=openpyxl
        outlook_export.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: outlook_export
        path: dist/outlook_export.exe
