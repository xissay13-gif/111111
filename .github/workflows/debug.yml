name: Build Debug EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install selenium pyinstaller

    - name: Build Debug EXE
      run: >
        pyinstaller --onefile --name asud_debug
        --hidden-import=selenium.webdriver.edge.webdriver
        --hidden-import=selenium.webdriver.edge.service
        --hidden-import=selenium.webdriver.edge.options
        asud_debug.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: asud_debug
        path: dist/asud_debug.exe
