name: Build АСУД EXE

on:
  push:
    branches: [ main, background-mode ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install selenium openpyxl pyinstaller

    - name: Build EXE
      run: >
        pyinstaller --onefile --name asud
        --add-data "addresses.csv;."
        --hidden-import=selenium.webdriver.edge.webdriver
        --hidden-import=selenium.webdriver.edge.service
        --hidden-import=selenium.webdriver.edge.options
        --hidden-import=selenium.webdriver.common.action_chains
        --hidden-import=selenium.webdriver.support.ui
        --hidden-import=selenium.webdriver.support.expected_conditions
        --hidden-import=openpyxl
        --hidden-import=shared.config
        --hidden-import=shared.ui
        --hidden-import=shared.correspondent
        --hidden-import=shared.attachments
        --hidden-import=shared.okrug_parser
        --hidden-import=flows.mix
        --hidden-import=flows.auto_create
        --hidden-import=flows.smart
        app.py

    - name: Copy headless launcher
      run: copy asud_headless.bat dist\

    - name: Upload artifact (exe + bat)
      uses: actions/upload-artifact@v4
      with:
        name: asud
        path: |
          dist/asud.exe
          dist/asud_headless.bat
